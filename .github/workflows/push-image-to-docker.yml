name: mirror to Docker Hub

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["build and push to GHCR"]
    types: [completed]

permissions:
  contents: read
  packages: write

concurrency:
  group: dockerhub-mirror-mimir-healthcheck
  cancel-in-progress: false

jobs:
  detect:
    name: Detect missing tags on Docker Hub
    runs-on: ubuntu-latest
    outputs:
      missing_tags: ${{ steps.collect.outputs.missing_tags }}
      max_version: ${{ steps.collect.outputs.max_version }}
      repo_name: ${{ steps.repo.outputs.name }}
    steps:
      - name: Derive repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR (for source manifest inspect)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub (for dest manifest inspect)
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Collect tags to mirror (recent window) + current max semver
        id: collect
        run: |
          set -euo pipefail

          WINDOW=50
          DATA=$(curl -fsSL "https://hub.docker.com/v2/repositories/grafana/mimir/tags?page_size=100")

          CANDIDATES_JSON=$(echo "$DATA" | jq -c --argjson w "$WINDOW" '
            [.results[]
              | select(.name | test("^[0-9]+\\.[0-9]+\\.[0-9]+(-rc\\.[0-9]+)?$"))
              | {name, last_updated}
            ]
            | sort_by(.last_updated)
            | reverse
            | .[0:$w]
            | map(.name)
          ')

          MAX=$(echo "$DATA" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)

          if [ -z "${MAX}" ]; then
            echo "No stable semver tags found on Docker Hub in 100 recent tags" >&2
            exit 1
          fi

          echo "Candidate tags (window=${WINDOW}): $(echo "$CANDIDATES_JSON" | jq -r 'join(", ")')"
          echo "Max stable semver (for latest): ${MAX}"

          GHCR_BASE="ghcr.io/${{ github.repository }}"
          DH_BASE="docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ steps.repo.outputs.name }}"

          MISSING=()
          while IFS= read -r tag; do
            SRC="${GHCR_BASE}:${tag}"
            DST="${DH_BASE}:${tag}"

            # Only mirror tags that actually exist in GHCR (source of truth)
            if ! docker manifest inspect "$SRC" >/dev/null 2>&1; then
              echo "Skip (not in GHCR yet): $tag"
              continue
            fi

            if docker manifest inspect "$DST" >/dev/null 2>&1; then
              echo "Exists on Docker Hub: $tag"
            else
              echo "Missing on Docker Hub: $tag"
              MISSING+=("$tag")
            fi
          done < <(echo "$CANDIDATES_JSON" | jq -r '.[]')

          if [ "${#MISSING[@]}" -eq 0 ]; then
            MISSING_JSON='[]'
          else
            MISSING_JSON=$(printf '%s\n' "${MISSING[@]}" | jq -R . | jq -s -c .)
          fi

          echo "missing_tags=${MISSING_JSON}" >> "$GITHUB_OUTPUT"
          echo "max_version=${MAX}" >> "$GITHUB_OUTPUT"
  mirror:
    name: Mirror missing tags
    needs: detect
    if: needs.detect.outputs.missing_tags != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.detect.outputs.missing_tags) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Mirror manifest from GHCR to Docker Hub
        run: |
          set -euo pipefail
          SRC="ghcr.io/${{ github.repository }}:${{ matrix.version }}"
          DST_BASE="docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ needs.detect.outputs.repo_name }}"
          docker buildx imagetools create \
            --tag "${DST_BASE}:${{ matrix.version }}" \
            "${SRC}"
  up_to_date:
    name: Up-to-date
    needs: detect
    if: needs.detect.outputs.missing_tags == '[]'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No missing tags to mirror to Docker Hub in window"
  ensure-latest:
    name: Ensure Docker Hub latest points to max semver
    needs: [detect, mirror, up_to_date]
    if: >
      always() &&
      needs.detect.result == 'success' &&
      needs.mirror.result != 'failure' &&
      needs.up_to_date.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Detect and fix latest tag if needed
        run: |
          set -euo pipefail
          MAX="${{ needs.detect.outputs.max_version }}"
          SRC="ghcr.io/${{ github.repository }}:${MAX}"
          DST_BASE="docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ needs.detect.outputs.repo_name }}"
          DST="${DST_BASE}:latest"

          if SRC_INSPECT=$(docker manifest inspect --verbose "$SRC" 2>/dev/null); then
            echo "Found max version tag in GHCR: ${SRC}"
          else
            echo "Max version ${MAX} not present in GHCR; not updating Docker Hub :latest" >&2
            exit 0
          fi

          SRC_DIGEST=$(echo "${SRC_INSPECT}" | jq -r '
            if type == "array" then .[0].Descriptor.digest // empty
            else .Descriptor.digest // empty end
          ')
          if [ -z "${SRC_DIGEST}" ]; then
            echo "Failed to parse digest for ${SRC}" >&2
            exit 1
          fi

          DST_INSPECT=$(docker manifest inspect --verbose "${DST}" 2>/dev/null || true)
          DST_DIGEST=""
          if [ -n "${DST_INSPECT}" ]; then
            DST_DIGEST=$(echo "${DST_INSPECT}" | jq -r '
              if type == "array" then .[0].Descriptor.digest // empty
              else .Descriptor.digest // empty end
            ')
          fi

          echo "Max tag:    ${SRC} (digest=${SRC_DIGEST})"
          echo "Latest tag: ${DST} (digest=${DST_DIGEST:-<missing>})"

          if [ -n "${DST_DIGEST:-}" ] && [ "${DST_DIGEST}" = "${SRC_DIGEST}" ]; then
            echo "Docker Hub latest tag is already correct"
            exit 0
          fi

          echo "Updating Docker Hub latest tag -> ${SRC}"
          docker buildx imagetools create --tag "${DST}" "${SRC}"

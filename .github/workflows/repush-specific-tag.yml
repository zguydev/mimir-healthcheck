name: rebuild and repush tag (GHCR and Docker Hub)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream grafana/mimir tag to rebuild (e.g. 2.17.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  rebuild-and-mirror:
    name: Rebuild tag and push to GHCR and Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Derive repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract image annotations
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          annotations: |
            org.opencontainers.image.title=mimir-healthcheck
            org.opencontainers.image.description=Grafana Mimir image with healthcheck
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.authors=zguydev <zguy@zguy.dev>
            org.opencontainers.image.created=${{ github.run_started_at }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      - name: Rebuild and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ inputs.tag }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            MIMIR_IMAGE_TAG=${{ inputs.tag }}
      - name: Mirror the rebuilt image from GHCR to Docker Hub
        run: |
          set -euo pipefail
          SRC="ghcr.io/${{ github.repository }}:${{ inputs.tag }}"
          DST="docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ steps.repo.outputs.name }}:${{ inputs.tag }}"
          docker buildx imagetools create --tag "${DST}" "${SRC}"

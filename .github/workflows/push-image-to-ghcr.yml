name: build and push to GHCR

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *' # every 6 hours

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-build-mimir-healthcheck
  cancel-in-progress: false

jobs:
  detect:
    name: Detect missing upstream tags
    runs-on: ubuntu-latest
    outputs:
      missing_tags: ${{ steps.collect.outputs.missing_tags }}
      max_version: ${{ steps.collect.outputs.max_version }}
    steps:
      - name: Log in to GHCR (for manifest inspect)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Collect missing tags (recent window) + current max semver
        id: collect
        run: |
          set -euo pipefail

          WINDOW=20
          DATA=$(curl -fsSL "https://hub.docker.com/v2/repositories/grafana/mimir/tags?page_size=100")

          CANDIDATES_JSON=$(echo "$DATA" | jq -c --argjson w "$WINDOW" '
            [.results[]
              | select(.name | test("^[0-9]+\\.[0-9]+\\.[0-9]+(-rc\\.[0-9]+)?$"))
              | {name, last_updated}
            ]
            | sort_by(.last_updated)
            | reverse
            | .[0:$w]
            | map(.name)
          ')

          MAX=$(echo "$DATA" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)

          if [ -z "${MAX}" ]; then
            echo "No stable semver tags found on Docker Hub in 100 recent tags" >&2
            exit 1
          fi

          echo "Candidate tags (window=${WINDOW}): $(echo "$CANDIDATES_JSON" | jq -r 'join(", ")')"
          echo "Max stable semver (for latest): ${MAX}"

          # Determine which candidate tags are missing in GHCR
          MISSING=()
          while IFS= read -r tag; do
            IMAGE="ghcr.io/${{ github.repository }}:${tag}"
            if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
              echo "Exists in GHCR: $tag"
            else
              echo "Missing in GHCR: $tag"
              MISSING+=("$tag")
            fi
          done < <(echo "$CANDIDATES_JSON" | jq -r '.[]')

          if [ "${#MISSING[@]}" -eq 0 ]; then
            MISSING_JSON='[]'
          else
            MISSING_JSON=$(printf '%s\n' "${MISSING[@]}" | jq -R . | jq -s -c .)
          fi

          echo "missing_tags=${MISSING_JSON}" >> "$GITHUB_OUTPUT"
          echo "max_version=${MAX}" >> "$GITHUB_OUTPUT"
  build:
    name: Build missing tags
    needs: detect
    if: needs.detect.outputs.missing_tags != '[]'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.detect.outputs.missing_tags) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute tags to push
        id: taglist
        run: |
          set -euo pipefail
          VERSION="${{ matrix.version }}"
          TAGS=("ghcr.io/${{ github.repository }}:${VERSION}")

          # Only current max stable semver gets latest tag
          if [ "${VERSION}" = "${{ needs.detect.outputs.max_version }}" ]; then
            TAGS=("ghcr.io/${{ github.repository }}:latest" "${TAGS[@]}")
          fi

          {
            echo "list<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Extract image annotations
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          annotations: |
            org.opencontainers.image.title=mimir-healthcheck
            org.opencontainers.image.description=Grafana Mimir image with healthcheck
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ matrix.version }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.authors=zguydev <zguy@zguy.dev>
            org.opencontainers.image.created=${{ github.run_started_at }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.taglist.outputs.list }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            MIMIR_IMAGE_TAG=${{ matrix.version }}
  up_to_date:
    name: Up-to-date
    needs: detect
    if: needs.detect.outputs.missing_tags == '[]'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No missing tags to build in GHCR window"
  ensure-latest:
    name: Ensure GHCR latest points to max semver
    needs: [detect, build, up_to_date]
    if: >
      always() &&
      needs.detect.result == 'success' &&
      needs.build.result != 'failure' &&
      needs.up_to_date.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Detect and fix latest tag if needed
        run: |
          set -euo pipefail
          MAX="${{ needs.detect.outputs.max_version }}"
          REPO="ghcr.io/${{ github.repository }}"

          if MAX_INSPECT=$(docker manifest inspect --verbose "${REPO}:${MAX}" 2>/dev/null); then
            echo "Found max version tag in GHCR: ${REPO}:${MAX}"
          else
            echo "Max version tag ${MAX} not present in GHCR; not updating latest tag" >&2
            exit 0
          fi

          MAX_DIGEST=$(echo "${MAX_INSPECT}" | jq -r '
            if type == "array" then .[0].Descriptor.digest // empty
            else .Descriptor.digest // empty end
          ')
          if [ -z "${MAX_DIGEST}" ]; then
            echo "Failed to parse digest for ${REPO}:${MAX}" >&2
            exit 1
          fi

          LATEST_INSPECT=$(docker manifest inspect --verbose "${REPO}:latest" 2>/dev/null || true)
          LATEST_DIGEST=""
          if [ -n "${LATEST_INSPECT}" ]; then
            LATEST_DIGEST=$(echo "${LATEST_INSPECT}" | jq -r '
              if type == "array" then .[0].Descriptor.digest // empty
              else .Descriptor.digest // empty end
            ')
          fi

          echo "Max tag:    ${REPO}:${MAX}  digest=${MAX_DIGEST}"
          echo "Latest tag: ${REPO}:latest  digest=${LATEST_DIGEST:-<missing>}"

          if [ -n "${LATEST_DIGEST:-}" ] && [ "${LATEST_DIGEST}" = "${MAX_DIGEST}" ]; then
            echo "GHCR latest tag is already correct"
            exit 0
          fi

          echo "Updating GHCR latest tag -> ${MAX}"
          docker buildx imagetools create --tag "${REPO}:latest" "${REPO}:${MAX}"
